<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wasteless | Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glass-effect {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
        }
        .green-gradient {
            background: linear-gradient(135deg, #059669 0%, #10b981 100%);
        }
    </style>
</head>
<body class="bg-gray-50 font-sans">

    <div class="min-h-screen flex flex-col md:flex-row">
        
        <div class="hidden md:flex md:w-1/2 green-gradient items-center justify-center p-12 text-white">
            <div class="max-w-md">
                <h1 class="text-5xl font-bold mb-6">Wasteless</h1>
                <p class="text-xl opacity-90">Connecting Valenzuela City for a greener tomorrow. Turn your e-waste into value.</p>
                <div class="mt-12 space-y-4">
                    <div class="flex items-center gap-4">
                        <span class="p-2 bg-white/20 rounded-full">✓</span>
                        <span>Secure E-Waste Disposal</span>
                    </div>
                    <div class="flex items-center gap-4">
                        <span class="p-2 bg-white/20 rounded-full">✓</span>
                        <span>Real-time Bidding for Shops</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="w-full md:w-1/2 flex items-center justify-center p-8">
            <div class="w-full max-w-md space-y-8">
                <div class="text-center">
                    <h2 class="text-3xl font-bold text-gray-900">Sign In</h2>
                    <p class="text-gray-500 mt-2">Sign in to access your dashboard</p>
                </div>

                <div class="grid grid-cols-2 gap-3 mb-6">
                    <button class="role-btn border-2 border-emerald-500 bg-emerald-50 text-emerald-700 py-2 rounded-lg font-medium transition hover:bg-emerald-100">E-Waste Seller <br><p class="ewasteButton text-xs text-gray-500">List and sell electronic devices </p></button>
                    <button class="role-btn border-2 border-gray-200 py-2 rounded-lg text-gray-600 font-medium transition hover:border-emerald-500">Repair Shop / Tech-Harvester<br><p class="ewasteButton text-xs text-gray-500">Browse and bid on components</p></button>
                    <button class="role-btn border-2 border-gray-200 py-2 rounded-lg text-gray-600 font-medium transition hover:border-emerald-500">Administrator<br><p class="ewasteButton text-xs text-gray-500">Manage platform operations</p></button>
                    <button class="role-btn border-2 border-gray-200 py-2 rounded-lg text-gray-600 font-medium transition hover:border-emerald-500">Environmental Officer<br><p class="ewasteButton text-xs text-gray-500">Monitor City Metrics</p></button>
                </div>

                <form class="space-y-6">
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Email Address</label>
                        <input type="email" required class="mt-1 block w-full px-4 py-3 bg-gray-100 border-transparent rounded-lg focus:border-emerald-500 focus:bg-white focus:ring-0 transition" placeholder="you@example.com">
                    </div>
                    
                    <div>
                        <div class="flex justify-between">
                            <label class="block text-sm font-medium text-gray-700">Password</label>
                            <a href="#" class="text-sm text-emerald-600 hover:underline">Forgot?</a>
                        </div>
                        <input type="password" required class="mt-1 block w-full px-4 py-3 bg-gray-100 border-transparent rounded-lg focus:border-emerald-500 focus:bg-white focus:ring-0 transition" placeholder="••••••••">
                    </div>

                    <button type="submit" class="w-full green-gradient text-white py-3 rounded-lg font-bold shadow-lg hover:opacity-90 transition transform active:scale-95">
                        Sign In
                    </button>
                </form>

                <div class="relative flex items-center justify-center my-6">
                    <span class="absolute px-3 bg-gray-50 text-gray-400 text-sm">Or login with</span>
                    <div class="w-full border-t border-gray-300"></div>
                </div>

                <button class="w-full flex items-center justify-center gap-3 border border-gray-300 py-3 rounded-lg hover:bg-gray-100 transition">
                    <img src="https://www.svgrepo.com/show/475656/google.svg" class="h-5 w-5" alt="Google">
                    <span class="text-gray-700 font-medium">Continue with Google</span>
                </button>

                <p class="text-center text-gray-600">
                    New to Wasteless? <a href="#" class="text-emerald-600 font-bold hover:underline">Create account</a>
                </p>
            </div>
        </div>
    </div>

</body>
</html>
